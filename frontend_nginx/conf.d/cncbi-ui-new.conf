# CNCBI ECL UI HTTPS Server Configuration (Production)
server {
    listen 443 ssl;
    server_name eclapp.cncbinternational.com;
    client_max_body_size 1000M;

    # SSL Certificate Configuration
    ssl_certificate      C:/nginx-1.26.3/ssl/prd_cert.pem;
    ssl_certificate_key  C:/nginx-1.26.3/ssl/prd_key.pem;

    # SSL Security Configuration
    ssl_session_cache    shared:SSL:1m;
    ssl_session_timeout  5m;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers  on;

    # Enable debug logging
    error_log logs/debug.log debug;
    access_log logs/access.log;

    # Set root directory
    root D:/inetpub/wwwroot;
    index index.html;

    # API Proxy to Calculation Server - SSL Configuration
    location /api/ {
        client_max_body_size 1000M;
        proxy_pass https://10.191.140.219;
        proxy_set_header Host 10.191.140.219;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSL Configuration for backend
        proxy_ssl_verify off;
        proxy_ssl_certificate C:/nginx-1.26.3/ssl/uat_cert.pem;
        proxy_ssl_certificate_key C:/nginx-1.26.3/ssl/uat_key.pem;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_connect_timeout 10000s;
        proxy_send_timeout 10000s;
        proxy_read_timeout 10000s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_max_temp_file_size 0;
        proxy_temp_file_write_size 1m;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # CORS Configuration
        add_header Access-Control-Allow-Origin "https://eclapp.cncbinternational.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        add_header Access-Control-Allow-Credentials true always;

        # Debug headers
        add_header X-Debug-API-Proxy "true" always;
        add_header X-Debug-Backend "https://10.191.140.219$uri" always;
        add_header X-Debug-Original-URI "$uri" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://eclapp.cncbinternational.com";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
            add_header Access-Control-Allow-Credentials true;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type "text/plain; charset=utf-8";
            add_header Content-Length 0;
            return 204;
        }
    }

    # Test basic file serving
    location /test {
        return 200 "Basic test working. Root: $document_root, URI: $uri, Request filename: $request_filename\n";
        add_header Content-Type text/plain;
    }

    # Handle /PRD_Portal/ - use alias instead of rewrite
    location /PRD_Portal/ {
        alias D:/inetpub/wwwroot/CNCBI_ECL_UI_PROD/;
        try_files $uri $uri/ /PRD_Portal/index.html;

        # Add debug headers
        add_header X-Debug-URI $uri always;
        add_header X-Debug-Root $document_root always;
        add_header X-Debug-Path $request_filename always;

        # Handle MIME types within this location
        location ~* \.js$ {
            add_header Content-Type "application/javascript; charset=utf-8" always;
            add_header X-Debug-Path $request_filename always;
        }
        location ~* \.css$ {
            add_header Content-Type "text/css; charset=utf-8" always;
            add_header X-Debug-Path $request_filename always;
        }
        location ~* \.html$ {
            add_header Content-Type "text/html; charset=utf-8" always;
            add_header X-Debug-Path $request_filename always;
        }
    }

    # Handle exact /PRD_Portal path
    location = /PRD_Portal {
        return 301 /PRD_Portal/;
    }

    # Root redirect
    location = / {
        return 301 /PRD_Portal/;
    }

    # Health check
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Default 404 - catch remaining paths
    location ~* ^/(?!api|PRD_Portal|health|test) {
        return 404 "Not found: $uri\n";
        add_header Content-Type text/plain;
    }
}

# HTTP Redirect to HTTPS
server {
    listen 80;
    server_name eclapp.cncbinternational.com;
    client_max_body_size 100M;
    client_body_buffer_size 128k;

    location = /PRD_Portal {
        return 301 https://eclapp.cncbinternational.com/PRD_Portal/;
    }
    location /PRD_Portal/ {
        return 301 https://eclapp.cncbinternational.com$request_uri;
    }
    return 301 https://$server_name$request_uri;
}
