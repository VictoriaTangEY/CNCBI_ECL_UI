#user  nobody;
worker_processes  1;
#error_log  logs/error.log debug;
#pid        logs/nginx.pid;
events {
    worker_connections  1024;
}
http {
    include       mime.types;
    default_type  application/octet-stream;
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    # Fix for long server names
    server_names_hash_bucket_size 64;
    server_names_hash_max_size 512;
    # Add debug logging format
    log_format debug_format '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'upstream: $upstream_addr '
                           'upstream_status: $upstream_status '
                           'upstream_response_time: $upstream_response_time';
    access_log  logs/access.log debug_format;
    # Performance optimizations
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    # Include configuration files from conf.d directory
    include conf.d/*.conf;
    # Default server for localhost
    server {
        listen       80;
        server_name  localhost;
        location /PRD_Portal/ {
            # Proxy to production environment
            proxy_pass https://eclapp.cncbinternational.com/PRD_Portal/;
            proxy_set_header Host eclapp.cncbinternational.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /ecl/ {
            return 301 /PRD_Portal/;
        }
        location / {
            root   html;
            index  index.html index.htm;
        }
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
    # Original default server on port 8082
    server {
        listen       8082;
        server_name  localhost;
        location / {
            root   html;
            index  index.html index.htm;
        }
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}