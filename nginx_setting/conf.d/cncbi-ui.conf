# CNCBI ECL UI HTTPS Server Configuration
# Fixed version with correct location priority

server {
    listen 443 ssl;
    server_name eclsit.cncbinternational2.com;
    
    # SSL Certificate Configuration
    ssl_certificate      C:/nginx-1.26.3/ssl/cert.pem;
    ssl_certificate_key  C:/nginx-1.26.3/ssl/key.pem;
    
    # SSL Security Configuration
    ssl_session_cache    shared:SSL:1m;
    ssl_session_timeout  5m;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers  on;
    
    # Enable debug logging
    error_log logs/debug.log debug;
    access_log logs/access.log;
    
    # Set root directory
    root D:/inetpub/wwwroot;
    index index.html;
    
    # API Proxy to Calculation Server - SSL Configuration
    location /api/ {
        proxy_pass https://10.25.108.72;
        proxy_set_header Host 10.25.108.72;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSL Configuration for backend
        proxy_ssl_verify off;
        proxy_ssl_certificate C:/nginx-1.26.3/ssl/cert.pem;
        proxy_ssl_certificate_key C:/nginx-1.26.3/ssl/key.pem;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        
        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # CORS Configuration
        add_header Access-Control-Allow-Origin https://eclsit.cncbinternational2.com always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        add_header Access-Control-Allow-Credentials true always;
        
        # Debug headers
        add_header X-Debug-API-Proxy "true" always;
        add_header X-Debug-Backend "https://10.25.108.72$uri" always;
        add_header X-Debug-Original-URI "$uri" always;
        
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin https://eclsit.cncbinternational2.com;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
            add_header Access-Control-Allow-Credentials true;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type "text/plain; charset=utf-8";
            add_header Content-Length 0;
            return 204;
        }
    }
    
    # Test basic file serving
    location /test {
        return 200 "Basic test working. Root: $document_root, URI: $uri, Request filename: $request_filename\n";
        add_header Content-Type text/plain;
    }
    
    # Handle /ecl/ - use alias instead of rewrite
    location /ecl/ {
        alias D:/inetpub/wwwroot/CNCBI_ECL_UI_PROD/;
        try_files $uri $uri/ /index.html;
        
        # Add debug headers
        add_header X-Debug-URI $uri always;
        add_header X-Debug-Root $document_root always;
        add_header X-Debug-Path $request_filename always;
        
        # Handle MIME types within this location
        location ~* \.js$ {
            add_header Content-Type "application/javascript; charset=utf-8" always;
            add_header X-Debug-Path $request_filename always;
        }
        
        location ~* \.css$ {
            add_header Content-Type "text/css; charset=utf-8" always;
            add_header X-Debug-Path $request_filename always;
        }
        
        location ~* \.html$ {
            add_header Content-Type "text/html; charset=utf-8" always;
            add_header X-Debug-Path $request_filename always;
        }
    }
    
    # Handle exact /ecl path
    location = /ecl {
        return 301 /ecl/;
    }
    
    # Root redirect
    location = / {
        return 301 /ecl/;
    }
    
    # Health check
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Default 404 - catch remaining paths
    location ~* ^/(?!api|ecl|health|test) {
        return 404 "Not found: $uri\n";
        add_header Content-Type text/plain;
    }
}

# HTTP Redirect to HTTPS
server {
    listen 80;
    server_name eclsit.cncbinternational2.com;
    return 301 https://$server_name$request_uri;
}