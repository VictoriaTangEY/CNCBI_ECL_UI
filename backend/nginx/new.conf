server {
    listen 443 ssl;
    server_name 10.30.235.3;

    # [6.2] Disable server_tokens to hide Nginx version 
    server_tokens off;

    # [6.6] Configure SSL Protocols (Disable TLSv1 & TLSv1.1) 
    ssl_certificate /var/www/mywebsite/flaskapp/ssl/signed_cert.pem;
    ssl_certificate_key /var/www/mywebsite/flaskapp/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # [6.3] Control Resources and Limits to prevent DoS 
    client_body_buffer_size 1k;
    large_client_header_buffers 2 1k;
    client_max_body_size 1000M; # Kept 1000M for business requirements

    # [6.5] Set up Error Log with 'crit' severity level 
    error_log /var/log/nginx/error.log crit;

    location /api/ {
        # [6.4] Disable Unwanted HTTP methods 
        limit_except GET HEAD POST { 
            deny all; 
        }

        # --- Existing Proxy Settings ---
        proxy_pass http://127.0.0.1:5010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header X-Nginx-Proxy "true";
        proxy_connect_timeout 1000s;
        proxy_read_timeout 1000s;
        proxy_send_timeout 1000s;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        keepalive_timeout 1000s;
    }
}